@if (isOpen()) {
    <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-xs animate-in fade-in duration-200">
        
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh] animate-in zoom-in-95 duration-200">
            
            <div class="bg-neutral-800 text-white p-4 flex justify-between items-center">
                <h3 class="m-0 text-lg font-bold">🗓️ Añadir Nuevo Partido</h3>
                <button (click)="closeModal()" class="text-neutral-400 hover:text-white cursor-pointer text-xl bg-transparent border-0 outline-none">&times;</button>
            </div>

            <form (submit)="onSaveMatch($event)" class="p-6 overflow-y-auto flex flex-col gap-4">
                


                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2">
                    <div class="p-4 bg-blue-50/50 rounded-xl border border-blue-100 flex flex-col gap-3">
                        <h4 class="m-0 text-sm font-bold text-blue-700 flex items-center gap-1">🏠 Bando Local</h4>
                        <div class="flex flex-col gap-1">
                            <label class="text-[11px] font-semibold text-neutral-500">Jugador 1</label>
                            <select name="local1" [(ngModel)]="newMatchForm.local1" required
                                    class="p-2 rounded-lg border border-neutral-300 bg-white text-sm outline-none focus:border-blue-500 transition-colors">
                                <option value="bot">Anónimo</option>
                                @for (p of classification(); track p.IDPlayer) {
                                    <option [value]="p.IDPlayer">{{ p.NamePlayerLeague || p.NamePlayer }}</option>
                                }
                            </select>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[11px] font-semibold text-neutral-500">Jugador 2</label>
                            <select name="local2" [(ngModel)]="newMatchForm.local2" required
                                    class="p-2 rounded-lg border border-neutral-300 bg-white text-sm outline-none focus:border-blue-500 transition-colors">
                                <option value="bot">Anónimo</option>
                                @for (p of classification(); track p.IDPlayer) {
                                    <option [value]="p.IDPlayer">{{ p.NamePlayerLeague || p.NamePlayer }}</option>
                                }
                            </select>
                        </div>
                    </div>

                    <div class="p-4 bg-red-50/50 rounded-xl border border-red-100 flex flex-col gap-3">
                        <h4 class="m-0 text-sm font-bold text-red-700 flex items-center gap-1">🏃‍♂️ Bando Visitante</h4>
                        <div class="flex flex-col gap-1">
                            <label class="text-[11px] font-semibold text-neutral-500">Jugador 1</label>
                            <select name="visitante1" [(ngModel)]="newMatchForm.visitante1" required
                                    class="p-2 rounded-lg border border-neutral-300 bg-white text-sm outline-none focus:border-blue-500 transition-colors">
                                <option value="bot">Anónimo</option>
                                @for (p of classification(); track p.IDPlayer) {
                                    <option [value]="p.IDPlayer">{{ p.NamePlayerLeague || p.NamePlayer }}</option>
                                }
                            </select>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[11px] font-semibold text-neutral-500">Jugador 2</label>
                            <select name="visitante2" [(ngModel)]="newMatchForm.visitante2" required
                                    class="p-2 rounded-lg border border-neutral-300 bg-white text-sm outline-none focus:border-blue-500 transition-colors">
                                <option value="bot">Anónimo</option>
                                @for (p of classification(); track p.IDPlayer) {
                                    <option [value]="p.IDPlayer">{{ p.NamePlayerLeague || p.NamePlayer }}</option>
                                }
                            </select>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-3 mt-4 pt-4 border-t border-neutral-100">
                    <button type="button" (click)="closeModal()" class="px-4 py-2 bg-neutral-100 hover:bg-neutral-200 text-neutral-700 rounded-lg text-sm font-semibold transition-colors cursor-pointer">
                        Cancelar
                    </button>
                    <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-semibold transition-colors cursor-pointer shadow-xs">
                        Crear Partido 🗓️
                    </button>
                </div>
            </form>
        </div>
    </div>
}
