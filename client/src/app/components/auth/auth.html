<div class="flex items-center justify-center min-h-[80vh] bg-slate-50 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md bg-white p-6 sm:p-10 rounded-xl shadow-md border border-slate-100">
        
        <div class="flex mb-8 border-b-2 border-slate-200">
            <button 
                type="button"
                (click)="toggleMode()"
                [class]="isLoginMode() 
                ? 'flex-1 py-3 text-center font-bold text-emerald-600 border-b-3 border-emerald-500 -mb-[2px] transition-all duration-300' 
                : 'flex-1 py-3 text-center font-bold text-slate-400 hover:text-slate-600 transition-all duration-300'"
            >
                Entrar
            </button>
            <button 
                type="button"
                (click)="toggleMode()"
                [class]="!isLoginMode() 
                ? 'flex-1 py-3 text-center font-bold text-emerald-600 border-b-3 border-emerald-500 -mb-[2px] transition-all duration-300' 
                : 'flex-1 py-3 text-center font-bold text-slate-400 hover:text-slate-600 transition-all duration-300'"
            >
                Registrarse
            </button>
        </div>

        <h2 class="text-center text-xl sm:text-2xl font-bold mb-6 text-slate-800">
            {{ isLoginMode() ? '¡Hola de nuevo! ⚽' : 'Únete a FriendCup 🏆' }}
        </h2>

        @if (errorMessage()) {
            <div class="bg-red-50 text-red-600 p-3 rounded-md text-sm mb-4 border-l-4 border-red-500 font-medium animate-fadeIn">
                {{ errorMessage() }}
            </div>
        }

        <form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="space-y-5">
        
            @if (!isLoginMode()) {
                <div class="flex flex-col gap-1.5 animate-in fade-in slide-in-from-top-1 duration-200">
                    <label class="font-semibold text-xs sm:text-sm text-slate-700">Nombre de Jugador</label>
                    <input 
                        type="text" 
                        formControlName="Nombre" 
                        placeholder="Ej: Gerardo_10"
                        class="w-full p-3 border border-slate-300 rounded-md text-sm sm:text-base transition-colors focus:border-emerald-500 focus:outline-none"
                    >
                </div>
            }

            <div class="flex flex-col gap-1.5">
                <label class="font-semibold text-xs sm:text-sm text-slate-700">
                    {{ isLoginMode() ? 'Correo o Nombre de Jugador' : 'Correo Electrónico' }}
                </label>
                <input 
                    type="text" 
                    formControlName="Email" 
                    [placeholder]="isLoginMode() ? 'correo@ejemplo.com o tu usuario' : 'correo@ejemplo.com'"
                    class="w-full p-3 border border-slate-300 rounded-md text-sm sm:text-base transition-colors focus:border-emerald-500 focus:outline-none"
                >
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="font-semibold text-xs sm:text-sm text-slate-700">Contraseña</label>
                <input 
                    type="password" 
                    formControlName="Password" 
                    placeholder="••••••••"
                    class="w-full p-3 border border-slate-300 rounded-md text-sm sm:text-base transition-colors focus:border-emerald-500 focus:outline-none"
                >
            </div>

            <button 
                type="submit" 
                [disabled]="authForm.invalid" 
                class="w-full mt-2 p-3 bg-emerald-500 text-white font-bold rounded-md text-sm sm:text-base shadow-sm hover:bg-emerald-600 transition-colors cursor-pointer disabled:bg-slate-300 disabled:cursor-not-allowed disabled:shadow-none"
            >
                {{ isLoginMode() ? 'Iniciar Sesión' : 'Crear Cuenta Nueva' }}
            </button>
        </form>

        @if (isLoginMode()) {
            <div class="mt-6 text-center animate-in fade-in duration-300">
                <a href="/forgot-password" class="text-sm font-medium text-slate-500 hover:text-emerald-600 transition-colors hover:underline hover:underline-offset-4 decoration-2 cursor-pointer">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>
        }

    </div>
</div>
