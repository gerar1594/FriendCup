<div class="min-h-screen bg-neutral-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <h2 class="mt-6 text-center text-3xl font-extrabold text-neutral-900">
            Recuperar Contraseña
        </h2>
        <p class="mt-2 text-center text-sm text-neutral-600">
            ¿Recordaste tu contraseña? 
            <a routerLink="/login" class="font-medium text-blue-600 hover:text-blue-500">Inicia sesión aquí</a>
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow sm:rounded-xl sm:px-10 border border-neutral-200">
            
            <div class="flex p-1 mb-6 bg-neutral-100 rounded-lg">
                <button 
                    (click)="setMethod('email')"
                    [ngClass]="recoveryMethod() === 'email' ? 'bg-white shadow-sm text-neutral-900 font-semibold' : 'text-neutral-500 hover:text-neutral-700'"
                    class="flex-1 py-2 text-sm rounded-md transition-all cursor-pointer">
                    Con Email
                </button>
                <button 
                    (click)="setMethod('username')"
                    [ngClass]="recoveryMethod() === 'username' ? 'bg-white shadow-sm text-neutral-900 font-semibold' : 'text-neutral-500 hover:text-neutral-700'"
                    class="flex-1 py-2 text-sm rounded-md transition-all cursor-pointer">
                    Sin Email
                </button>
            </div>

            @if (!successMessage()) {
                <form (ngSubmit)="onSubmit()" class="space-y-6">
                    <div>
                        <label for="input-field" class="block text-sm font-medium text-neutral-700">
                            {{ recoveryMethod() === 'email' ? 'Correo Electrónico' : 'Nombre de Usuario o Teléfono' }}
                        </label>
                        <div class="mt-1 relative">
                            <input 
                                id="input-field" 
                                name="inputValue" 
                                [type]="recoveryMethod() === 'email' ? 'email' : 'text'"
                                [placeholder]="recoveryMethod() === 'email' ? 'ejemplo@correo.com' : 'Ej: jugador123'"
                                [ngModel]="inputValue()"
                                (ngModelChange)="inputValue.set($event)"
                                class="appearance-none block w-full px-3 py-2 border border-neutral-300 rounded-md shadow-sm placeholder-neutral-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-colors"
                                required>
                        </div>
                    </div>

                    @if (errorMessage()) {
                        <div class="text-red-600 text-sm font-medium bg-red-50 p-3 rounded-md border border-red-100 animate-in fade-in">
                            {{ errorMessage() }}
                        </div>
                    }

                    <button 
                        type="submit" 
                        [disabled]="isLoading() || !inputValue()"
                        class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all cursor-pointer">
                        @if (isLoading()) {
                            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            Procesando...
                        } @else {
                            {{ recoveryMethod() === 'email' ? 'Enviar enlace' : 'Buscar cuenta' }}
                        }
                    </button>
                </form>
            } 
            
            @else {
                <div class="text-center animate-in zoom-in duration-300">
                    <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
                        <span class="text-2xl">✉️</span>
                    </div>
                    <h3 class="text-lg font-medium text-neutral-900 mb-2">¡Solicitud recibida!</h3>
                    <p class="text-sm text-neutral-600 mb-6 leading-relaxed">
                        {{ successMessage() }}
                    </p>
                    <button 
                        (click)="successMessage.set(''); inputValue.set('')"
                        class="text-blue-600 hover:text-blue-500 font-medium text-sm">
                        Intentar con otra cuenta
                    </button>
                </div>
            }
        </div>
    </div>
</div>
