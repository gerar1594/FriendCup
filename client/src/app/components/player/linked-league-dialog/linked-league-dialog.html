@if(showJoinDialog()){
    <div class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-neutral-900/60 backdrop-blur-sm animate-in fade-in duration-300">
        
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-in zoom-in-95 duration-300">
            <div class="bg-blue-600 p-6 text-center text-white">
                <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl">
                    👋
                </div>
                <h2 class="text-xl font-bold m-0">¡Te han invitado!</h2>
                <p class="text-blue-100 text-sm mt-1">Únete a {{ league().NameLeague }}</p>
            </div>

            <div class="p-6">
                <p class="text-neutral-600 text-sm text-center mb-5 font-medium">
                    ¿Eres alguno de estos jugadores que ya están en la liga?
                </p>

                <div class="grid grid-cols-2 gap-3 max-h-[250px] overflow-y-auto pr-1 mb-6
                            [&::-webkit-scrollbar]:w-1.5 [&::-webkit-scrollbar-track]:bg-neutral-100 
                            [&::-webkit-scrollbar-thumb]:bg-neutral-300 [&::-webkit-scrollbar-thumb]:rounded-full">
                    
                    @for (unclaimed of unClaimedPlayers(); track unclaimed.IDLeaguePlayer) {
                        <button 
                            (click)="onClaimProfile(unclaimed)"
                            class="flex flex-col items-center p-3 rounded-xl border border-neutral-200 hover:border-blue-500 hover:bg-blue-50 transition-all cursor-pointer group text-center">
                            <div class="w-10 h-10 bg-neutral-100 rounded-full flex items-center justify-center text-neutral-500 group-hover:text-blue-600 group-hover:bg-blue-100 transition-colors mb-2 text-lg font-bold">
                                {{ unclaimed.NamePlayerLeague.charAt(0) }}
                            </div>
                            <span class="text-xs font-bold text-neutral-700 group-hover:text-blue-700 truncate w-full">
                                {{ unclaimed.NamePlayerLeague }}
                            </span>
                        </button>
                    }

                    @if (unClaimedPlayers().length === 0) {
                        <div class="col-span-2 text-center p-4 bg-neutral-50 rounded-lg text-neutral-500 text-sm border border-dashed border-neutral-200">
                            No hay perfiles pendientes de reclamar.
                        </div>
                    }
                </div>
            </div>
        </div>
    </div>
}
